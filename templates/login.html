
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub - Login/Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="stars-container"></div>
    
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-gamepad"></i> <span>ARCADE HUB</span>
        </div>
    </nav>

    <main class="container">
        <!-- Auth Section -->
        <div id="authSection" class="section">
            <div class="card glass">
                <h2 id="authTitle">Welcome Back, Player!</h2>
                <div class="tabs">
                    <button class="tab active" onclick="showTab('login')">Login</button>
                    <button class="tab" onclick="showTab('register')">Register</button>
                </div>
                <form id="authForm" onsubmit="handleAuth(event)">
                    <div id="authStatus" class="status-msg hidden"></div>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn-primary" id="authBtn">Enter Arcade</button>
                </form>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
